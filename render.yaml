services:
  - type: web
    name: kalai-coco-api
    runtime: node
    buildCommand: |
      npm install --legacy-peer-deps &&
      npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: PUPPETEER_CACHE_DIR
        value: /tmp/puppeteer
