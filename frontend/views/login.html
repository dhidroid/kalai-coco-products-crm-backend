<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Kalai Coco Products CRM</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      .login-page {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top left, var(--primary-subtle) 0%, transparent 40%),
                    radial-gradient(circle at bottom right, #fef2f2 0%, transparent 40%);
        padding: 24px;
      }
      .login-card {
        width: 100%;
        max-width: 440px;
        padding: 48px;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-xl);
      }
      .login-card h1 {
        text-align: center;
        margin-bottom: 8px;
        font-size: 2rem;
        background: linear-gradient(135deg, var(--primary), #a855f7);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .login-card .subtitle {
        text-align: center;
        color: var(--text-secondary);
        margin-bottom: 40px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="login-page">
      <div class="login-card">
        <h1>KALAI COCO</h1>
        <p class="subtitle">Enterprise Resource Dashboard</p>

        <div id="alert-container"></div>

        <form id="login-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <div style="position: relative;">
               <input type="email" id="email" name="email" class="form-control" placeholder="name@company.com" required autocomplete="email" style="padding-left: 40px;" />
               <i data-lucide="mail" style="position: absolute; left: 12px; top: 10px; width: 18px; color: var(--text-muted);"></i>
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div style="position: relative;">
               <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password" style="padding-left: 40px;" />
               <i data-lucide="lock" style="position: absolute; left: 12px; top: 10px; width: 18px; color: var(--text-muted);"></i>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" id="submit-btn" style="width: 100%; margin-top: 24px; padding: 12px;">
            <span>Sign In</span> <i data-lucide="arrow-right" style="width: 18px;"></i>
          </button>
        </form>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/login.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }
      });
    </script>
  </body>
</html>
