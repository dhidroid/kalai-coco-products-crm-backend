<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Kalai Coco Products</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <meta name="description" content="Kalai Coco Products CRM Dashboard - Manage your business, invoices, products, and customers efficiently." />
    <!-- SEO Optimization -->
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Dashboard - Kalai Coco Products" />
    <meta property="og:description" content="Manage your Coco business operations efficiently." />
  </head>
  <body>
    <div class="app-container">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h2>KALAI COCO</h2>
        </div>
        <ul class="sidebar-menu">
          <li>
            <a href="/dashboard" class="active" data-page="dashboard">
              <i data-lucide="layout-dashboard"></i> <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a href="/invoices" data-page="invoices">
              <i data-lucide="file-text"></i> <span>Invoices</span>
            </a>
          </li>
          <li>
            <a href="/productions" data-page="productions">
              <i data-lucide="factory"></i> <span>Production</span>
            </a>
          </li>
          <li>
            <a href="/products" data-page="products">
              <i data-lucide="package"></i> <span>Products</span>
            </a>
          </li>
          <li>
            <a href="/customers" data-page="customers">
              <i data-lucide="users"></i> <span>Customers</span>
            </a>
          </li>
          <li>
            <a href="/profile" data-page="profile">
              <i data-lucide="user"></i> <span>Profile</span>
            </a>
          </li>
        </ul>
        <div class="sidebar-footer">
          <a href="#" id="logout-btn">
            <i data-lucide="log-out"></i> <span>Logout</span>
          </a>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-wrapper">
        <header>
          <div class="header-left">
            <h1 id="page-title">Dashboard</h1>
          </div>
          <div class="header-right">
            <div class="user-profile" onclick="window.location.href='/profile'">
              <div class="user-avatar" id="user-avatar">U</div>
              <span id="user-name">User Name</span>
              <i data-lucide="chevron-down" style="width: 14px; opacity: 0.6;"></i>
            </div>
          </div>
        </header>

        <section class="content-area" id="content-area">
          <!-- Dynamic Content -->
          <div class="loading">
            <div class="spinner"></div>
            <p style="margin-top: 16px; color: var(--text-secondary);">Initializing workplace...</p>
          </div>
        </section>
      </main>
    </div>
    <!-- View Invoice Modal -->
    <div class="modal-backdrop" id="view-invoice-modal">
        <div class="modal" style="max-width: 800px;">
            <div class="modal-header">
                <h3>Invoice Details</h3>
                <button class="btn btn-sm btn-secondary" onclick="closeModal('view-invoice-modal')"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body" id="view-invoice-body">
                <!-- Content will be injected by JavaScript -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('view-invoice-modal')">Close</button>
                <button class="btn btn-primary" id="view-modal-download-btn">Download PDF</button>
            </div>
        </div>
    </div>
    <script>
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
    </script>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script>
      // Initialize Lucide icons
      document.addEventListener('DOMContentLoaded', () => {
        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }
      });
    </script>
  </body>
</html>
