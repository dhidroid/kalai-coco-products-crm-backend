<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Update Invoice - Kalai Coco Products</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>KALAI COCO</h2>
        </div>
        <ul class="sidebar-menu">
          <li><a href="/dashboard" data-page="dashboard"><i data-lucide="layout-dashboard"></i> <span>Dashboard</span></a></li>
          <li><a href="/invoices" class="active" data-page="invoices"><i data-lucide="file-text"></i> <span>Invoices</span></a></li>
          <li><a href="/productions" data-page="productions"><i data-lucide="factory"></i> <span>Production</span></a></li>
          <li><a href="/products" data-page="products"><i data-lucide="package"></i> <span>Products</span></a></li>
          <li><a href="/customers" data-page="customers"><i data-lucide="users"></i> <span>Customers</span></a></li>
          <li><a href="/profile" data-page="profile"><i data-lucide="user"></i> <span>Profile</span></a></li>
        </ul>
        <div class="sidebar-footer">
          <a href="#" id="logout-btn"><i data-lucide="log-out"></i> <span>Logout</span></a>
        </div>
      </aside>

      <main class="main-wrapper">
        <header>
          <div class="header-left">
            <h1>Update Invoice</h1>
          </div>
          <div class="header-right">
            <button class="btn btn-secondary" onclick="window.location.href='/invoices'">
              <i data-lucide="arrow-left"></i> Back to List
            </button>
            <div class="user-profile" onclick="window.location.href='/profile'">
              <div class="user-avatar" id="user-avatar">U</div>
              <span id="user-name">User Name</span>
            </div>
          </div>
        </header>

        <section class="content-area">
          <div class="card">
            <form id="invoice-form" class="complex-form">
              <div class="form-section">
                <h3>General Information</h3>
                <div class="form-row">
                  <div class="form-group">
                    <label>Invoice Number</label>
                    <input type="text" id="invoice-number" name="invoiceNumber" class="form-control" required readonly />
                  </div>
                  <div class="form-group">
                    <label>Invoice Date</label>
                    <input type="date" id="invoice-date" name="invoiceDate" class="form-control" required />
                  </div>
                </div>
              </div>

              <div class="form-section">
                <h3>Customer Details</h3>
                <div class="form-row">
                  <div class="form-group">
                    <label>Bill To Customer</label>
                    <select id="bill-to" name="billToUserId" class="form-control" required></select>
                  </div>
                  <div class="form-group">
                    <label>Ship To (Optional)</label>
                    <div style="display: flex; gap: 8px; align-items: baseline;">
                      <select id="ship-to" name="shipToUserId" class="form-control"></select>
                      <label style="white-space: nowrap; cursor: pointer; font-size: 13px; opacity: 0.8;">
                        <input type="checkbox" id="manual-ship" onchange="toggleShipManual(this)"> Manual
                      </label>
                    </div>
                  </div>
                </div>

                <div id="ship-manual-fields" style="display: none; border: 1px dashed var(--primary-subtle); padding: 16px; border-radius: 8px; margin-bottom: 24px; background: rgba(255,255,255,0.02);">
                  <div class="form-row">
                    <div class="form-group"><label>Ship To Name</label><input type="text" id="ship-to-name" name="shipToName" class="form-control" placeholder="Consignee Name"></div>
                    <div class="form-group"><label>Ship To Phone</label><input type="text" id="ship-to-phone" name="shipToPhone" class="form-control" placeholder="Contact number"></div>
                  </div>
                  <div class="form-row">
                    <div class="form-group"><label>Ship To GSTIN</label><input type="text" id="ship-to-gstin" name="shipToGstin" class="form-control" placeholder="GSTIN (if different)"></div>
                    <div class="form-group"><label>Ship To Address</label><textarea id="ship-to-address" name="shipToAddress" class="form-control" rows="2" placeholder="Full shipping address"></textarea></div>
                  </div>
                </div>

                <div class="form-row">
                  <div class="form-group">
                    <label>Vehicle Number</label>
                    <input type="text" id="vehicle-number" name="vehicleNumber" class="form-control" placeholder="TN-30-XX-0000" />
                  </div>
                  <div class="form-group">
                    <label>Date of Supply</label>
                    <input type="date" id="date-of-supply" name="dateOfSupply" class="form-control" />
                  </div>
                </div>
              </div>

              <div class="form-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                  <h3>Invoice Items</h3>
                  <button type="button" class="btn btn-secondary btn-sm" onclick="addItem()">
                    <i data-lucide="plus"></i> Add Line Item
                  </button>
                </div>
                <div id="invoice-items" class="items-list">
                  <!-- Rows injected here -->
                </div>
              </div>

              <div class="form-section">
                <h3>Tax Configuration</h3>
                <div class="form-row" style="grid-template-columns: repeat(3, 1fr);">
                  <div class="form-group"><label>SGST (%)</label><input type="number" id="sgst-rate" value="9.00" step="0.01" class="form-control"></div>
                  <div class="form-group"><label>CGST (%)</label><input type="number" id="cgst-rate" value="9.00" step="0.01" class="form-control"></div>
                  <div class="form-group"><label>IGST (%)</label><input type="number" id="igst-rate" value="0.00" step="0.01" class="form-control"></div>
                </div>
              </div>

              <div class="form-actions" style="margin-top: 32px; border-top: 1px solid var(--primary-subtle); padding-top: 24px;">
                <button type="button" class="btn btn-secondary" onclick="window.location.href='/invoices'">Discard</button>
                <button type="submit" class="btn btn-primary" style="padding: 12px 32px; font-weight: 600;">Update Invoice & Regenerate PDF</button>
              </div>
            </form>
          </div>
        </section>
      </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/update-invoice.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        if (typeof lucide !== 'undefined') lucide.createIcons();
      });
    </script>
  </body>
</html>
