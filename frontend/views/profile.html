<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile - Kalai Coco Products</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>KALAI COCO</h2>
        </div>
        <ul class="sidebar-menu">
          <li><a href="/dashboard" data-page="dashboard"><i data-lucide="layout-dashboard"></i> <span>Dashboard</span></a></li>
          <li><a href="/invoices" data-page="invoices"><i data-lucide="file-text"></i> <span>Invoices</span></a></li>
          <li><a href="/productions" data-page="productions"><i data-lucide="factory"></i> <span>Production</span></a></li>
          <li><a href="/products" data-page="products"><i data-lucide="package"></i> <span>Products</span></a></li>
          <li><a href="/customers" data-page="customers"><i data-lucide="users"></i> <span>Customers</span></a></li>
          <li><a href="/profile" class="active" data-page="profile"><i data-lucide="user"></i> <span>Profile</span></a></li>
        </ul>
        <div class="sidebar-footer">
          <a href="#" id="logout-btn"><i data-lucide="log-out"></i> <span>Logout</span></a>
        </div>
      </aside>

      <main class="main-wrapper">
        <header>
          <div class="header-left">
            <h1>My Profile</h1>
          </div>
          <div class="header-right">
            <div class="user-profile">
              <div class="user-avatar" id="user-avatar">U</div>
              <span id="user-name">User Name</span>
            </div>
          </div>
        </header>

        <section class="content-area">
          <div class="profile-container">
            <div class="profile-header">
              <div class="profile-avatar-large" id="profile-avatar">U</div>
              <div class="profile-info">
                <h2 id="profile-full-name">Full Name</h2>
                <p id="profile-role">Role</p>
              </div>
            </div>

            <div class="card">
              <div class="card-header">
                <h3 class="card-title">Edit Profile</h3>
              </div>
              <div class="modal-body">
                <form id="profile-form">
                  <div class="form-row">
                    <div class="form-group">
                      <label>First Name</label>
                      <input type="text" id="profile-first-name" name="firstName" class="form-control" required />
                    </div>
                    <div class="form-group">
                      <label>Last Name</label>
                      <input type="text" id="profile-last-name" name="lastName" class="form-control" required />
                    </div>
                  </div>

                  <div class="form-row">
                    <div class="form-group">
                      <label>Email Address</label>
                      <input type="email" id="profile-email" name="email" class="form-control" required />
                    </div>
                    <div class="form-group">
                      <label>Phone Number</label>
                      <input type="tel" id="profile-phone" name="phone" class="form-control" placeholder="+91 9876543210" />
                    </div>
                  </div>

                  <div class="form-group">
                    <label>GSTIN (Optional)</label>
                    <input type="text" id="profile-gstin" name="gstin" class="form-control" placeholder="12ABCDE1234F1Z1" />
                  </div>

                  <div class="form-group">
                    <label>Address</label>
                    <textarea id="profile-address" name="address" class="form-control" placeholder="Office / Billing address..."></textarea>
                  </div>

                  <div style="margin: 24px 0 12px; font-weight: 600; color: var(--text-primary); border-bottom: 2px solid var(--primary-subtle); padding-bottom: 8px;">
                    Change Password
                  </div>
                  <div class="form-group">
                    <label>New Password (Leave blank to keep current)</label>
                    <input type="password" id="profile-password" name="password" class="form-control" placeholder="New strong password" />
                  </div>

                  <div style="margin-top: 32px; display: flex; justify-content: flex-end;">
                    <button type="submit" class="btn btn-primary" id="save-btn">
                      <i data-lucide="save"></i> Update Profile
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/profile.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }
      });
    </script>
  </body>
</html>
