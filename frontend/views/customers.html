<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customers - Kalai Coco Products</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <meta name="description" content="Manage your customer relations and profiles. Quick access to customer contact details and GST info." />
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>KALAI COCO</h2>
        </div>
        <ul class="sidebar-menu">
          <li><a href="/dashboard" data-page="dashboard"><i data-lucide="layout-dashboard"></i> <span>Dashboard</span></a></li>
          <li><a href="/invoices" data-page="invoices"><i data-lucide="file-text"></i> <span>Invoices</span></a></li>
          <li><a href="/productions" data-page="productions"><i data-lucide="factory"></i> <span>Production</span></a></li>
          <li><a href="/products" data-page="products"><i data-lucide="package"></i> <span>Products</span></a></li>
          <li><a href="/customers" class="active" data-page="customers"><i data-lucide="users"></i> <span>Customers</span></a></li>
          <li><a href="/profile" data-page="profile"><i data-lucide="user"></i> <span>Profile</span></a></li>
        </ul>
        <div class="sidebar-footer">
          <a href="#" id="logout-btn"><i data-lucide="log-out"></i> <span>Logout</span></a>
        </div>
      </aside>

      <main class="main-wrapper">
        <header>
          <div class="header-left">
            <h1>Customers</h1>
          </div>
          <div class="header-right">
            <button class="btn btn-primary" onclick="openCustomerModal()">
              <i data-lucide="plus"></i> Add Customer
            </button>
            <div class="user-profile" onclick="window.location.href='/profile'">
              <div class="user-avatar" id="user-avatar">U</div>
              <span id="user-name">User Name</span>
            </div>
          </div>
        </header>

        <section class="content-area">
          <div class="card">
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>GSTIN</th>
                    <th>Address</th>
                    <th>Role</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="customers-table-body">
                  <!-- JS Injected Rows -->
                </tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- Customer Modal -->
    <div class="modal-backdrop" id="customer-modal">
      <div class="modal">
        <div class="modal-header">
          <h3 id="customer-modal-title">Add/Edit Customer</h3>
          <button class="btn btn-sm btn-secondary" onclick="closeModal('customer-modal')"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <form id="customer-form">
            <input type="hidden" id="customer-id" name="customerId" />
            <div class="form-row">
              <div class="form-group">
                <label>First Name</label>
                <input type="text" id="customer-first-name" name="firstName" class="form-control" required placeholder="John" />
              </div>
              <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="customer-last-name" name="lastName" class="form-control" required placeholder="Doe" />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="customer-email" name="email" class="form-control" required placeholder="john@example.com" />
              </div>
              <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="customer-phone" name="phone" class="form-control" placeholder="+91 9876543210" />
              </div>
            </div>

            <div class="form-group">
              <label>GSTIN (Optional)</label>
              <input type="text" id="customer-gstin" name="gstin" class="form-control" placeholder="12ABCDE1234F1Z1" />
            </div>

            <div class="form-group">
              <label>Address</label>
              <textarea id="customer-address" name="address" class="form-control" placeholder="Full billing address..."></textarea>
            </div>

            <div class="form-group" id="password-group">
              <label>Password <span>(Required for new account)</span></label>
              <input type="password" id="customer-password" name="password" class="form-control" placeholder="Set a temporary password" />
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal('customer-modal')">Cancel</button>
          <button class="btn btn-primary" onclick="submitCustomer()">Save Customer</button>
        </div>
      </div>
    </div>

    <!-- View Modal -->
    <div class="modal-backdrop" id="view-customer-modal">
      <div class="modal">
        <div class="modal-header">
          <h3>Customer Details</h3>
          <button class="btn btn-sm btn-secondary" onclick="closeModal('view-customer-modal')"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body" id="view-customer-body">
          <!-- JS Injected Body -->
        </div>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/customers.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }
      });
    </script>
  </body>
</html>
