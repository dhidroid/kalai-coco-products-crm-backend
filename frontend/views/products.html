<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products - Kalai Coco Products</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="dashboard">
      <aside class="sidebar">
        <div class="sidebar-logo">
          <h2>Kalai Coco</h2>
        </div>
        <ul class="sidebar-menu">
          <li>
            <a href="/dashboard" data-page="dashboard"
              ><span class="icon">📊</span> <span>Dashboard</span></a
            >
          </li>
          <li>
            <a href="/invoices" data-page="invoices"
              ><span class="icon">📄</span> <span>Invoices</span></a
            >
          </li>
          <li>
            <a href="/products" class="active" data-page="products"
              ><span class="icon">📦</span> <span>Products</span></a
            >
          </li>
          <li>
            <a href="/customers" data-page="customers"
              ><span class="icon">👥</span> <span>Customers</span></a
            >
          </li>
          <li>
            <a href="#logout" id="logout-btn"><span class="icon">🚪</span> <span>Logout</span></a>
          </li>
        </ul>
      </aside>

      <main class="main-content">
        <header class="header">
          <h1>Products</h1>
          <div class="header-actions">
            <button class="btn btn-primary" onclick="openProductModal()">+ Add Product</button>
          </div>
        </header>

        <div id="content-area">
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">Product List</h3>
            </div>
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>HSN Code</th>
                    <th>Unit</th>
                    <th>Price</th>
                    <th>Tax Rate</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="products-table-body">
                  <tr>
                    <td colspan="9">
                      <div class="loading"><div class="spinner"></div></div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="pagination" id="products-pagination"></div>
          </div>
        </div>
      </main>
    </div>

    <!-- Product Modal -->
    <div class="modal-overlay" id="product-modal">
      <div class="modal">
        <div class="modal-header">
          <h3 id="product-modal-title">Add Product</h3>
          <button class="modal-close" onclick="closeModal('product-modal')">&times;</button>
        </div>
        <div class="modal-body">
          <form id="product-form">
            <input type="hidden" id="product-id" name="productId" />

            <div class="form-row">
              <div class="form-group">
                <label for="product-code">Product Code</label>
                <input
                  type="text"
                  id="product-code"
                  name="productCode"
                  placeholder="e.g., P001"
                  required
                />
              </div>
              <div class="form-group">
                <label for="product-name">Product Name</label>
                <input
                  type="text"
                  id="product-name"
                  name="productName"
                  placeholder="e.g., Coconut Oil"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <label for="product-description">Description</label>
              <textarea
                id="product-description"
                name="description"
                rows="3"
                placeholder="Product description..."
              ></textarea>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="hsn-code">HSN Code</label>
                <input type="text" id="hsn-code" name="hsnCode" placeholder="e.g., 1515" />
              </div>
              <div class="form-group">
                <label for="unit">Unit</label>
                <select id="unit" name="unit">
                  <option value="KG">Kilogram (KG)</option>
                  <option value="LTR">Liter (LTR)</option>
                  <option value="PCS">Pieces (PCS)</option>
                  <option value="MT">Metric Ton (MT)</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="price">Price</label>
                <input
                  type="number"
                  id="price"
                  name="price"
                  min="0"
                  step="0.01"
                  placeholder="0.00"
                  required
                />
              </div>
              <div class="form-group">
                <label for="tax-rate">Tax Rate (%)</label>
                <input
                  type="number"
                  id="tax-rate"
                  name="taxRate"
                  min="0"
                  step="0.01"
                  value="18.00"
                />
              </div>
            </div>

            <div class="form-group">
              <label>
                <input type="checkbox" id="is-active" name="isActive" checked /> Active
              </label>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal('product-modal')">Cancel</button>
          <button class="btn btn-primary" onclick="submitProduct()">Save Product</button>
        </div>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/products.js"></script>
  </body>
</html>
