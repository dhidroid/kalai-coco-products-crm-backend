<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productions - Kalai Coco Products</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <meta name="description" content="Production tracking module for Kalai Coco Products. Log and manage the production of coco fiber, peat, and other products." />
  </head>
  <body>
    <div class="app-container">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>KALAI COCO</h2>
        </div>
        <ul class="sidebar-menu">
          <li><a href="/dashboard" data-page="dashboard"><i data-lucide="layout-dashboard"></i> <span>Dashboard</span></a></li>
          <li><a href="/invoices" data-page="invoices"><i data-lucide="file-text"></i> <span>Invoices</span></a></li>
          <li><a href="/productions" class="active" data-page="productions"><i data-lucide="factory"></i> <span>Production</span></a></li>
          <li><a href="/products" data-page="products"><i data-lucide="package"></i> <span>Products</span></a></li>
          <li><a href="/customers" data-page="customers"><i data-lucide="users"></i> <span>Customers</span></a></li>
          <li><a href="/profile" data-page="profile"><i data-lucide="user"></i> <span>Profile</span></a></li>
        </ul>
        <div class="sidebar-footer">
          <a href="#" id="logout-btn"><i data-lucide="log-out"></i> <span>Logout</span></a>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-wrapper">
        <header>
          <div class="header-left">
            <h1>Production Logs</h1>
          </div>
          <div class="header-right">
            <button class="btn btn-primary" onclick="openProductionModal()">
              <i data-lucide="plus"></i> New Production Log
            </button>
            <div class="user-profile" onclick="window.location.href='/profile'">
              <div class="user-avatar" id="user-avatar">U</div>
              <span id="user-name">User Name</span>
            </div>
          </div>
        </header>

        <section class="content-area">
          <div class="card">
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Batch #</th>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Unit</th>
                    <th>Notes</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="productions-table-body">
                  <!-- JS Injected Rows -->
                </tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- Production Modal -->
    <div class="modal-backdrop" id="production-modal">
      <div class="modal">
        <div class="modal-header">
          <h3 id="production-modal-title">Log New Production</h3>
          <button class="btn btn-sm btn-secondary" onclick="closeModal('production-modal')"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <form id="production-form">
            <input type="hidden" id="production-id-hidden" name="id">
            <div class="form-row">
              <div class="form-group">
                <label>Production Date</label>
                <input type="date" id="production-date" name="productionDate" class="form-control" required />
              </div>
              <div class="form-group">
                <label>Batch Number</label>
                <input type="text" id="batch-number" name="batchNumber" class="form-control" required placeholder="B-2024-001" />
              </div>
            </div>

            <div class="form-group">
              <label>Product</label>
              <select id="product-id" name="productId" class="form-control" required>
                <option value="">Select Product</option>
              </select>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Quantity</label>
                <input type="number" id="production-quantity" name="quantity" class="form-control" required step="0.01" value="0.00" />
              </div>
              <div class="form-group">
                <label>Unit</label>
                <select id="production-unit" name="unit" class="form-control" required>
                  <option value="KG">Kilogram (KG)</option>
                  <option value="PCS">Piece (PCS)</option>
                  <option value="LTR">Liter (LTR)</option>
                  <option value="BDL">Bundle (BDL)</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label>Notes (Optional)</label>
              <textarea id="production-notes" name="notes" class="form-control" placeholder="Production quality, shift info, etc."></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal('production-modal')">Cancel</button>
          <button class="btn btn-primary" onclick="submitProduction()">Save Log</button>
        </div>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/productions.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }
      });
    </script>
  </body>
</html>
